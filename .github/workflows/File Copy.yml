name: Windows Python File Copy

on:

  schedule:
  - cron: '17 01 * * *'
  workflow_dispatch:
    inputs:
      source_path:
        description: 'Source file path (relative to repo)'
        required: true
        default: 'Source/file.txt'
      destination_path:
        description: 'Destination file path (relative to repo)'
        required: true
        default: 'Destination/file.txt'

jobs:
  copy-file-job:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Python file copy script
        run: |
          python copy_file.py "${{ github.event.inputs.source_path }}" "${{ github.event.inputs.destination_path }}"

      - name: Upload copied file as artifact
        uses: actions/upload-artifact@v4
        with:
          name: copied-file
          path: Destination/file.txt
